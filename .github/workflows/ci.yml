name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Module import check
        env:
          ACCESS_TOKEN_REQUIRED: "false"
          ADMIN_API_KEY: "test"
        run: python -c "from main import app; print('FastAPI app loaded OK')"

  tcc-worker-test:
    name: TCC Worker Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/tcc
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/tcc/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx vitest run

  markdown-lint:
    name: Markdown Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for f in \
            docs/CN/project_collaboration_CN.md \
            docs/CN/Production_TCC_CN.md \
            docs/CN/Service_endpoint_CN.md \
            .agents/p_text-cli.md \
            p-tokens.md \
            TCC_ledger.md \
          ; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
            echo "OK: $f"
          done

  tcc-recalculate:
    name: TCC Mint Recalculate
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: server/tcc
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if TCC_ledger.md modified
        id: check
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} | grep -q 'TCC_ledger.md'; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.check.outputs.modified == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/tcc/package-lock.json

      - name: Install dependencies
        if: steps.check.outputs.modified == 'true'
        run: npm ci

      - name: Run recalculate
        if: steps.check.outputs.modified == 'true'
        run: node ci/recalculate.js ../../TCC_ledger.md
