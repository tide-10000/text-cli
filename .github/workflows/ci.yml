name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    name: Python Lint & Syntax Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server/python
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --max-line-length=120 --statistics --exit-zero

      - name: Syntax check
        run: python -m py_compile main.py

      - name: Module import check
        env:
          ACCESS_TOKEN_REQUIRED: "false"
          ADMIN_API_KEY: "test"
        run: python -c "from main import app; print('FastAPI app loaded OK')"

  markdown-lint:
    name: Markdown Structure Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          for f in \
            docs/project_collaboration_CN.md \
            docs/Production_TCC_CN.md \
            docs/Service_endpoint_CN.md \
            .agents/p_text-cli.md \
            .agents/p-tokens.md \
          ; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
            echo "OK: $f"
          done
