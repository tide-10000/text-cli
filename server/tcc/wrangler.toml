name = "tcc-mint-worker"
main = "src/index.js"
compatibility_date = "2026-05-01"
workers_dev = true

# Worker v2: PR 模式
# Token 权限需升级为 contents:write, pull_requests:write（另需 issues:write 用于告警）
[vars]
ANCHOR_FILE = ".agents/p_text-cli.md"
LEDGER_FILE = "TCC_ledger.md"
SCALING_FACTOR = "100"
DAILY_MINT_CAP = "100"
DELTA_BYTES_THRESHOLD = "10"
RAW_SCORE_THRESHOLD = "200"

[[d1_databases]]
binding = "DB"
database_name = "tcc-idempotency"
database_id = "eded8d51-4cb7-46e2-8cda-70cddb7b4d15"

[triggers]
crons = ["0 0 * * *"]
