name = "tcc-mint-worker"
main = "src/index.js"
compatibility_date = "2026-05-01"

[vars]
ANCHOR_FILE = ".agents/p_text-cli.md"
SCALING_FACTOR = "100"
DAILY_MINT_CAP = "100"
DELTA_BYTES_THRESHOLD = "10"
RAW_SCORE_THRESHOLD = "200"
DAILY_MINT_ISSUE_TITLE = "TCC 每日铸造日志"

[[d1_databases]]
binding = "DB"
database_name = "tcc-idempotency"
database_id = "placeholder-replace-after-create"

[triggers]
crons = ["0 0 * * *"]
